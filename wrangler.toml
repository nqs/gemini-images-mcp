name = "gemini-image-mcp"
main = "server.js"
compatibility_date = "2025-04-01"

routes = [
  { pattern = "gemini.mcp.nqs.io", custom_domain = true }
]

[placement]
mode = "smart"

[[r2_buckets]]
binding = "IMAGE_BUCKET"
bucket_name = "gemini-mcp-images"

[vars]
R2_PUBLIC_URL = "https://pub-XXXXXXXXXXXX.r2.dev"
