name = "image-mcp"
main = "server.js"
compatibility_date = "2025-04-01"
description = "MCP server for image generation via OpenRouter"

routes = [
  { pattern = "image.mcp.nqs.io", custom_domain = true }
]

[placement]
mode = "smart"

[[r2_buckets]]
binding = "IMAGE_BUCKET"
bucket_name = "image-mcp-images"

[vars]
R2_PUBLIC_URL = "https://storage.image.mcp.nqs.io"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
